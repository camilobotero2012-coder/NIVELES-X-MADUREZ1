<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Evaluación de Madurez</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .header-info {
            text-align: right;
            font-size: 13px;
            color: #666;
        }

        .header-info strong {
            color: #333;
            display: block;
        }

        .resultados-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .score-principal {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .score-circulo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 4px solid rgba(255,255,255,0.3);
        }

        .score-valor {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .score-maximo {
            font-size: 14px;
            opacity: 0.8;
        }

        .nivel-madurez {
            margin-bottom: 20px;
        }

        .nivel-titulo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .nivel-descripcion {
            font-size: 16px;
            opacity: 0.9;
            font-style: italic;
        }

        .porcentaje-total {
            font-size: 18px;
            opacity: 0.9;
        }

        .dimensiones-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dimension-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .dimension-nombre {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .dimension-score {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        .barra-progreso {
            height: 12px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .barra-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .dimension-porcentaje {
            font-size: 12px;
            color: #666;
            text-align: right;
        }

        .parametros-list {
            display: grid;
            gap: 8px;
        }

        .parametro-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #555;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .parametro-nombre {
            flex: 1;
        }

        .parametro-score {
            font-weight: bold;
            color: #667eea;
        }

        .acciones {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-descargar {
            background: #28a745;
            color: white;
        }

        .btn-descargar:hover {
            background: #218838;
            transform: translate(0, -2px);
        }

        .btn-nueva-evaluacion {
            background: #6c757d;
            color: white;
        }

        .btn-nueva-evaluacion:hover {
            background: #5a6268;
            transform: translate(0, -2px);
        }

        .btn-compartir {
            background: #007bff;
            color: white;
        }

        .btn-compartir:hover {
            background: #0056b3;
            transform: translate(0, -2px);
        }

        .btn-guardar {
            background: #ffc107;
            color: #212529;
        }

        .btn-guardar:hover {
            background: #e0a800;
            transform: translate(0, -2px);
        }

        .mensaje-estado {
            margin-bottom: 16px;
            font-size: 14px;
            color: #333;
        }

        .mensaje-estado.exito {
            color: #198754;
        }

        .mensaje-estado.error {
            color: #d63384;
        }

        .tabla-wrapper {
            overflow-x: auto;
        }

        .tabla-resultados {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }

        .tabla-resultados th,
        .tabla-resultados td {
            border: 1px solid #e2e8f0;
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
        }

        .tabla-resultados th {
            background: #f8fafc;
            color: #334155;
        }

        .tabla-resultados tbody tr:nth-child(even) {
            background: #f8f9fc;
        }

        .tabla-resultados tbody tr {
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .tabla-resultados tbody tr:hover {
            background: #eef2ff;
            transform: translateX(2px);
        }

        .tabla-resultados td:nth-child(4) {
            white-space: nowrap;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102,126,234,0.2);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b6b;
            text-align: center;
        }

        .success {
            background: #e0ffe0;
            color: #060;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #6b6;
            text-align: center;
        }

        .recomendaciones {
            background: #f0f4ff;
            border: 1px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .recomendaciones h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .recomendacion-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .recomendacion-titulo {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .recomendacion-texto {
            font-size: 13px;
            color: #666;
        }

        .estado-texto {
            font-weight: 700;
            font-size: 12px;
            display: inline-block;
            color: inherit;
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        .estado-perfecto {
            color: #28a745;
        }

        .estado-alto {
            color: #ffc107;
        }

        .estado-medio {
            color: #fd7e14;
        }

        .estado-bajo {
            color: #dc3545;
        }

        .estado-critico {
            color: #343a40;
        }

        @media (max-width: 768px) {
            .dimensiones-grid {
                grid-template-columns: 1fr;
            }

            .score-circulo {
                width: 120px;
                height: 120px;
            }

            .score-valor {
                font-size: 28px;
            }

            .nivel-titulo {
                font-size: 24px;
            }

            .acciones {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Resultados de la Evaluación</h1>
            <div class="header-info">
                <strong id="empresa-nombre">-</strong>
                <span id="usuario-email">-</span>
            </div>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">Cargando resultados...</p>
        </div>

        <div id="error-section" class="error" style="display: none;">
            <strong>❌ Error:</strong> <span id="error-mensaje"></span>
        </div>

        <div id="content" style="display: none;">
            <div class="resultados-container">
                <!-- SCORE PRINCIPAL -->
                <div class="score-principal">
                    <div class="score-circulo">
                        <div class="score-valor" id="score-total">0.00</div>
                        <div class="score-maximo">/ 5.0 puntos</div>
                    </div>

                    <div class="nivel-madurez">
                        <div class="nivel-titulo" id="nivel-titulo">-</div>
                        <div class="nivel-descripcion" id="nivel-descripcion">-</div>
                    </div>

                    <div class="porcentaje-total" id="porcentaje-total">-</div>
                </div>

                <!-- RECOMENDACIONES -->
                <div class="recomendaciones" id="recomendaciones-section">
                    <h3>💡 Recomendaciones Estratégicas</h3>
                    <div id="recomendaciones-lista"></div>
                </div>

                <!-- DIMENSIONES -->
                <h3 style="margin-bottom: 20px; color: #333;">📈 Desglose por Dimensiones</h3>
                <div class="dimensiones-grid" id="dimensiones-grid"></div>

                <!-- ACCIONES -->
                <div class="acciones">
                    <button class="btn-guardar" onclick="guardarResultados()">💾 Guardar resultados</button>
                    <button class="btn-descargar" onclick="descargarReporte()">📄 Descargar Reporte</button>
                    <button class="btn-compartir" onclick="compartirResultados()">📤 Compartir Resultados</button>
                    <button class="btn-nueva-evaluacion" onclick="nuevaEvaluacion()">🔄 Nueva Evaluación</button>
                </div>
                <div id="guardar-mensaje" class="mensaje-estado" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script src="calculador-madurez.js"></script>
    <script>
        let resultado = null;
        let reporte = null;
        let sesionData = null;

        /**
         * VALIDAR ACCESO Y CARGAR RESULTADOS
         */
        async function inicializarResultados() {
            try {
                // Validar sesión
                const sesion = localStorage.getItem('sesionActiva');
                if (!sesion) {
                    window.location.href = '/index.html';
                    return;
                }

                sesionData = JSON.parse(sesion);
                document.getElementById('empresa-nombre').textContent = sesionData.companyName || 'Empresa';
                document.getElementById('usuario-email').textContent = sesionData.email || 'Usuario';

                const query = new URLSearchParams(window.location.search);
                const registroId = query.get('id');
                const registroSeleccionado = query.get('registroSeleccionado');

                if (registroSeleccionado && localStorage.getItem('registroSeleccionado')) {
                    const registro = JSON.parse(localStorage.getItem('registroSeleccionado'));
                    localStorage.removeItem('registroSeleccionado');
                    await cargarDetalleSeleccionado(registro);
                } else if (registroId) {
                    await cargarDetallePorId(registroId);
                } else {
                    // Cargar últimos resultados desde localStorage
                    const evaluacion = localStorage.getItem('ultimaEvaluacion');
                    if (!evaluacion) {
                        mostrarError('No se encontraron resultados de evaluación');
                        return;
                    }

                    const datosEvaluacion = JSON.parse(evaluacion);
                    resultado = datosEvaluacion.resultado;
                    reporte = datosEvaluacion.reporte;
                    mostrarResultados();
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al cargar los resultados: ' + error.message);
            }
        }

        async function cargarDetallePorId(id) {
            try {
                mostrarGuardarMensaje('Cargando registro...', '');
                const response = await fetch(`/resultados/${encodeURIComponent(id)}`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'No se pudo cargar el registro.');
                }

                const registro = data.result;
                if (!registro) {
                    throw new Error('Registro no encontrado.');
                }

                resultado = {
                    total: Number(registro.puntajeTotal) || 0,
                    nivelMadurez: registro.nivel || '-',
                    totalPorcentaje: Number(registro.puntajeTotal) || 0,
                    dimensiones: (registro.dimensiones || []).map(dim => ({
                        nombreDimension: dim.nombre || dim.nombreDimension || '-',
                        porcentaje: Number(dim.porcentaje) || 0,
                        parametros: []
                    }))
                };
                reporte = { recomendaciones: [] };
                document.getElementById('empresa-nombre').textContent = registro.empresa || 'Empresa';
                mostrarResultados();
                mostrarGuardarMensaje('Detalle cargado desde la base de datos.', 'exito');
            } catch (error) {
                mostrarError(error.message);
                throw error;
            }
        }

        async function cargarDetalleSeleccionado(rawRegistro) {
            try {
                mostrarGuardarMensaje('Cargando registro seleccionado...', '');
                const registro = normalizarRegistro(rawRegistro);

                resultado = {
                    total: Number(registro.puntajeTotal) || 0,
                    nivelMadurez: registro.nivel || '-',
                    totalPorcentaje: Number(registro.puntajeTotal) || 0,
                    dimensiones: (registro.dimensiones || []).map(dim => ({
                        nombreDimension: dim.nombre || dim.nombreDimension || dim.dimension || '-',
                        porcentaje: Number(dim.porcentaje) || 0,
                        parametros: []
                    }))
                };
                reporte = { recomendaciones: [] };
                document.getElementById('empresa-nombre').textContent = registro.empresa || 'Empresa';
                mostrarResultados();
                mostrarGuardarMensaje('Detalle cargado desde la base de datos.', 'exito');
            } catch (error) {
                mostrarError(error.message);
                throw error;
            }
        }

        function normalizarRegistro(rawRegistro) {
            const empresa = rawRegistro.empresa || rawRegistro.Empresa || rawRegistro.company || rawRegistro.companyName || '-';
            const nivel = rawRegistro.nivel || rawRegistro.Nivel || rawRegistro.nivelMadurez || rawRegistro.NivelMadurez || '-';
            const puntajeTotal = Number(rawRegistro.puntajeTotal ?? rawRegistro.puntaje_total ?? rawRegistro['Puntaje Total'] ?? rawRegistro.total ?? 0);
            let dimensiones = rawRegistro.dimensiones ?? rawRegistro.Dimensiones ?? rawRegistro['Dimensiones'] ?? rawRegistro.dimension ?? [];

            if (typeof dimensiones === 'string') {
                dimensiones = dimensiones.split(';').map(item => {
                    const parts = item.split(':');
                    if (parts.length < 2) return null;
                    const nombre = parts[0].trim();
                    const porcentaje = Number(parts[1].replace('%', '').trim());
                    return { nombre, porcentaje };
                }).filter(Boolean);
            }

            return { empresa, nivel, puntajeTotal, dimensiones };
        }

        /**
         * MOSTRAR RESULTADOS
         */
        function mostrarResultados() {
            if (!resultado || !reporte) {
                mostrarError('Datos de evaluación incompletos');
                return;
            }

            // Score principal
            document.getElementById('score-total').textContent = resultado.total.toFixed(2);
            document.getElementById('nivel-titulo').textContent = resultado.nivelMadurez;
            document.getElementById('nivel-descripcion').textContent = resultado.descripcionNivel || resultado.nivelMadurez;
            document.getElementById('porcentaje-total').textContent = `Madurez: ${resultado.totalPorcentaje.toFixed(1)}%`;

            // Recomendaciones
            mostrarRecomendaciones();

            // Dimensiones
            mostrarDimensiones();
        }

        /**
         * MOSTRAR RECOMENDACIONES
         */
        function mostrarRecomendaciones() {
            const lista = document.getElementById('recomendaciones-lista');

            if (!reporte.recomendaciones || reporte.recomendaciones.length === 0) {
                lista.innerHTML = '<p>No hay recomendaciones específicas para tu nivel actual.</p>';
                return;
            }

            let html = '';
            reporte.recomendaciones.forEach(rec => {
                html += `
                    <div class="recomendacion-item">
                        <div class="recomendacion-titulo">${rec.dimension}</div>
                        <div class="recomendacion-texto">${rec.accion}</div>
                    </div>
                `;
            });

            lista.innerHTML = html;
        }

        function formatearClasificacion(porcentaje) {
            const valor = Math.round(porcentaje);
            let clasificacion = 'Sin datos';

            if (valor >= 81) clasificacion = 'Perfecto';
            else if (valor >= 61) clasificacion = 'Alto';
            else if (valor >= 41) clasificacion = 'Medio';
            else if (valor >= 21) clasificacion = 'Bajo';
            else if (valor >= 0) clasificacion = 'Crítico';

            return `${valor}% - ${clasificacion}`;
        }

        function claseClasificacion(porcentaje) {
            const valor = Math.round(porcentaje);
            if (valor >= 81) return 'estado-perfecto';
            if (valor >= 61) return 'estado-alto';
            if (valor >= 41) return 'estado-medio';
            if (valor >= 21) return 'estado-bajo';
            if (valor >= 0) return 'estado-critico';
            return '';
        }

        /**
         * MOSTRAR DIMENSIONES
         */
        function mostrarDimensiones() {
            const grid = document.getElementById('dimensiones-grid');

            let html = '';
            (resultado.dimensiones || []).forEach(dim => {
                const porcentajeLleno = dim.porcentaje || 0;
                const textoDimension = formatearClasificacion(dim.porcentaje);
                const claseDimension = claseClasificacion(dim.porcentaje);
                const parametros = Array.isArray(dim.parametros) ? dim.parametros : [];

                html += `
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-nombre">${dim.nombreDimension}</div>
                            <div class="dimension-score ${claseDimension}">${textoDimension}</div>
                        </div>

                        <div class="barra-progreso">
                            <div class="barra-fill" style="width: ${porcentajeLleno}%"></div>
                        </div>

                        <div class="dimension-porcentaje">${textoDimension}</div>

                        ${parametros.length > 0 ? `
                        <div class="parametros-list">
                            ${parametros.map(param => {
                                const textoParam = formatearClasificacion(param.porcentaje);
                                const claseParam = claseClasificacion(param.porcentaje);
                                return `
                                    <div class="parametro-item">
                                        <span class="parametro-nombre">${param.nombreParametro}</span>
                                        <span class="parametro-score ${claseParam}">${textoParam}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        /**
         * GUARDAR RESULTADOS EN BACKEND
         */
        async function guardarResultados() {
            try {
                if (!resultado || !sesionData) {
                    mostrarGuardarMensaje('No hay resultados cargados para guardar.', 'error');
                    return;
                }

                const payload = {
                    empresa: sesionData.companyName || 'Empresa desconocida',
                    fecha: new Date().toISOString(),
                    puntajeTotal: Number(resultado.total),
                    nivel: resultado.nivelMadurez,
                    dimensiones: resultado.dimensiones.map(dim => ({
                        nombre: dim.nombreDimension,
                        porcentaje: Number(dim.porcentaje)
                    }))
                };

                const response = await fetch('https://script.google.com/macros/s/AKfycbzwIG1w8c79MAO0gM_m0D0uFpbKD3GVpLu2ygP1sHEGPSRb9DJmX2xsx4W6bYcGMXDB/exec', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (error) {
                    throw new Error(`Respuesta no JSON del servidor: ${text.slice(0, 250)}`);
                }

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'No se pudo guardar el resultado.');
                }

                mostrarGuardarMensaje('Resultados guardados correctamente.', 'exito');
                setTimeout(() => {
                    window.location.href = 'database.html';
                }, 1200);
            } catch (error) {
                mostrarGuardarMensaje(`Error guardando resultados: ${error.message}`, 'error');
            }
        }

        function mostrarGuardarMensaje(texto, tipo) {
            const mensaje = document.getElementById('guardar-mensaje');
            mensaje.textContent = texto;
            mensaje.className = 'mensaje-estado';
            if (tipo === 'exito') mensaje.classList.add('exito');
            if (tipo === 'error') mensaje.classList.add('error');
        }

        /**
         * DESCARGAR REPORTE
         */
        function descargarReporte() {
    try {
        // Cargar jsPDF dinámicamente si no está cargado
        if (typeof window.jspdf === 'undefined') {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = () => generarPDF();
            document.head.appendChild(script);
        } else {
            generarPDF();
        }
    } catch (error) {
        mostrarError('Error al descargar el reporte: ' + error.message);
    }
}

function generarPDF() {
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const empresa = sesionData?.companyName || document.getElementById('empresa-nombre').textContent || 'Empresa';
        const usuario = sesionData?.userName || '';
        const email = sesionData?.email || '';
        const fecha = new Date().toLocaleDateString('es-ES');
        const puntaje = resultado?.total?.toFixed(2) || '0.00';
        const porcentaje = resultado?.totalPorcentaje?.toFixed(1) || '0.0';
        const nivel = resultado?.nivelMadurez || '-';
        const descripcion = resultado?.descripcionNivel || nivel;
        const dimensiones = resultado?.dimensiones || [];

        // ── Colores
        const morado = [102, 126, 234];
        const moradoOscuro = [118, 75, 162];
        const blanco = [255, 255, 255];
        const grisClaro = [248, 249, 250];
        const grisTexto = [100, 100, 100];
        const negro = [30, 30, 30];

        // ── ENCABEZADO
        doc.setFillColor(...morado);
        doc.rect(0, 0, 210, 45, 'F');

        doc.setTextColor(...blanco);
        doc.setFontSize(20);
        doc.setFont('helvetica', 'bold');
        doc.text('Reporte de Evaluacion de Madurez', 15, 18);

        doc.setFontSize(11);
        doc.setFont('helvetica', 'normal');
        doc.text(`Empresa: ${empresa}`, 15, 28);
        doc.text(`Fecha: ${fecha}`, 15, 36);
        if (usuario) doc.text(`Usuario: ${usuario}  |  ${email}`, 120, 28);

        // ── SCORE PRINCIPAL
        let y = 58;
        doc.setFillColor(...grisClaro);
        doc.roundedRect(15, y, 180, 38, 4, 4, 'F');

        doc.setTextColor(...morado);
        doc.setFontSize(28);
        doc.setFont('helvetica', 'bold');
        doc.text(`${puntaje} / 5.0`, 105, y + 14, { align: 'center' });

        doc.setFontSize(13);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...negro);
        doc.text(nivel, 105, y + 24, { align: 'center' });

        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...grisTexto);
        doc.text(`Madurez: ${porcentaje}%`, 105, y + 32, { align: 'center' });

        // ── DESCRIPCIÓN
        y += 48;
        doc.setFontSize(10);
        doc.setTextColor(...grisTexto);
        const descLines = doc.splitTextToSize(descripcion, 180);
        doc.text(descLines, 15, y);
        y += descLines.length * 5 + 8;

        // ── TÍTULO DIMENSIONES
        doc.setFillColor(...morado);
        doc.rect(15, y, 180, 8, 'F');
        doc.setTextColor(...blanco);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.text('Desglose por Dimensiones', 18, y + 5.5);
        y += 14;

        // ── DIMENSIONES
        dimensiones.forEach((dim, i) => {
            if (y > 265) {
                doc.addPage();
                y = 20;
            }

            const porcentajeDim = Math.round(dim.porcentaje || 0);
            let clasificacion = 'Critico';
            let colorBarra = [220, 53, 69];
            if (porcentajeDim >= 81) { clasificacion = 'Perfecto'; colorBarra = [40, 167, 69]; }
            else if (porcentajeDim >= 61) { clasificacion = 'Alto'; colorBarra = [255, 193, 7]; }
            else if (porcentajeDim >= 41) { clasificacion = 'Medio'; colorBarra = [253, 126, 20]; }
            else if (porcentajeDim >= 21) { clasificacion = 'Bajo'; colorBarra = [220, 53, 69]; }

            // Fondo tarjeta
            doc.setFillColor(i % 2 === 0 ? 255 : 248, i % 2 === 0 ? 255 : 249, i % 2 === 0 ? 255 : 252);
            doc.roundedRect(15, y, 180, 22, 2, 2, 'F');
            doc.setDrawColor(230, 230, 230);
            doc.roundedRect(15, y, 180, 22, 2, 2, 'S');

            // Nombre dimensión
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(...negro);
            const nombreCorto = doc.splitTextToSize(dim.nombreDimension || '-', 100);
            doc.text(nombreCorto[0], 19, y + 7);

            // Clasificación
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...colorBarra);
            doc.text(`${porcentajeDim}% - ${clasificacion}`, 155, y + 7, { align: 'right' });

            // Barra de progreso (fondo)
            doc.setFillColor(220, 220, 220);
            doc.roundedRect(19, y + 12, 172, 4, 2, 2, 'F');

            // Barra de progreso (relleno)
            const anchoRelleno = Math.max((porcentajeDim / 100) * 172, 2);
            doc.setFillColor(...colorBarra);
            doc.roundedRect(19, y + 12, anchoRelleno, 4, 2, 2, 'F');

            y += 26;
        });

        // ── PIE DE PÁGINA
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            doc.setFillColor(...morado);
            doc.rect(0, 287, 210, 10, 'F');
            doc.setTextColor(...blanco);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.text('Evaluacion de Madurez Comercial', 15, 293);
            doc.text(`Pagina ${i} de ${totalPages}`, 195, 293, { align: 'right' });
        }

        // ── DESCARGAR
        const nombreArchivo = `reporte-madurez-${empresa.replace(/\s+/g, '-')}.pdf`;
        doc.save(nombreArchivo);
        mostrarExito('✅ Reporte PDF descargado exitosamente');

    } catch (error) {
        mostrarError('Error al generar el PDF: ' + error.message);
    }
}

        /**
         * COMPARTIR RESULTADOS
         */
        function compartirResultados() {
            const texto = `Mi empresa ${sesionData.companyName} obtuvo un nivel de madurez "${resultado.nivelMadurez}" con ${resultado.total.toFixed(2)} puntos de 5.0 (${resultado.totalPorcentaje.toFixed(1)}%). ${resultado.descripcionNivel}`;

            if (navigator.share) {
                navigator.share({
                    title: 'Resultados Evaluación de Madurez',
                    text: texto,
                    url: window.location.href
                });
            } else {
                // Fallback: copiar al portapapeles
                navigator.clipboard.writeText(texto).then(() => {
                    mostrarExito('✅ Resultados copiados al portapapeles');
                }).catch(() => {
                    mostrarError('No se pudo compartir. Copia manualmente: ' + texto);
                });
            }
        }

        /**
         * NUEVA EVALUACIÓN
         */
        function nuevaEvaluacion() {
            if (confirm('¿Estás seguro de que quieres realizar una nueva evaluación? Se perderán los resultados actuales.')) {
                localStorage.removeItem('sesionActiva');
                localStorage.removeItem('ultimaEvaluacion');
                localStorage.removeItem('borrador-encuesta');
                window.location.href = '/index.html';
            }
        }

        /**
         * MOSTRAR ERROR
         */
        function mostrarError(mensaje) {
            document.getElementById('error-section').style.display = 'block';
            document.getElementById('error-mensaje').textContent = mensaje;
            document.getElementById('loading').style.display = 'none';
        }

        /**
         * MOSTRAR ÉXITO
         */
        function mostrarExito(mensaje) {
            const div = document.createElement('div');
            div.className = 'success';
            div.textContent = mensaje;
            document.querySelector('header').appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // Inicializar al cargar
        window.addEventListener('load', inicializarResultados);
    </script>
</body>
</html>

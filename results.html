<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Evaluación de Madurez</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: #667eea; font-size: 24px; }
        .header-info { text-align: right; font-size: 13px; color: #666; }
        .header-info strong { color: #333; display: block; font-family: 'Courier New', monospace; font-size: 15px; }
        .resultados-container { background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; }
        .score-principal { text-align: center; margin-bottom: 40px; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; color: white; }
        .score-circulo { width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; border: 4px solid rgba(255,255,255,0.3); }
        .score-valor { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .score-maximo { font-size: 14px; opacity: 0.8; }
        .nivel-madurez { margin-bottom: 20px; }
        .nivel-titulo { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        .nivel-descripcion { font-size: 16px; opacity: 0.9; font-style: italic; }
        .porcentaje-total { font-size: 18px; opacity: 0.9; }
        .dimensiones-grid { display: grid; gap: 20px; margin-bottom: 30px; }
        .dimension-card { background: #f8f9fa; border-radius: 10px; padding: 20px; border-left: 4px solid #667eea; }
        .dimension-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .dimension-nombre { font-size: 18px; font-weight: bold; color: #333; }
        .dimension-score { font-size: 16px; font-weight: bold; color: #667eea; }
        .barra-progreso { height: 12px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .barra-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s ease; }
        .dimension-porcentaje { font-size: 12px; color: #666; text-align: right; }
        .parametros-list { display: grid; gap: 8px; }
        .parametro-item { display: flex; justify-content: space-between; font-size: 13px; color: #555; padding: 5px 0; border-bottom: 1px solid #eee; }
        .parametro-nombre { flex: 1; }
        .parametro-score { font-weight: bold; color: #667eea; }
        .acciones { display: flex; gap: 15px; justify-content: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e0e0e0; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-descargar { background: #28a745; color: white; }
        .btn-descargar:hover { background: #218838; transform: translate(0, -2px); }
        .btn-nueva-evaluacion { background: #6c757d; color: white; }
        .btn-nueva-evaluacion:hover { background: #5a6268; transform: translate(0, -2px); }
        .btn-compartir { background: #007bff; color: white; }
        .btn-compartir:hover { background: #0056b3; transform: translate(0, -2px); }
        .btn-guardar { background: #ffc107; color: #212529; }
        .btn-guardar:hover { background: #e0a800; transform: translate(0, -2px); }
        .btn-volver-db { background: #343a40; color: white; }
        .btn-volver-db:hover { background: #23272b; transform: translate(0, -2px); }
        .mensaje-estado { margin-bottom: 16px; font-size: 14px; color: #333; }
        .mensaje-estado.exito { color: #198754; }
        .mensaje-estado.error { color: #d63384; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(102,126,234,0.2); border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #ffe0e0; color: #c00; padding: 20px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #ff6b6b; text-align: center; }
        .success { background: #e0ffe0; color: #060; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #6b6; text-align: center; }
        .recomendaciones { background: #f0f4ff; border: 1px solid #667eea; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .recomendaciones h3 { color: #667eea; margin-bottom: 15px; font-size: 18px; }
        .recomendacion-item { background: white; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .recomendacion-titulo { font-weight: bold; color: #333; margin-bottom: 5px; }
        .recomendacion-texto { font-size: 13px; color: #666; }
        .estado-perfecto { color: #28a745; }
        .estado-alto { color: #ffc107; }
        .estado-medio { color: #fd7e14; }
        .estado-bajo { color: #dc3545; }
        .estado-critico { color: #343a40; }
        @media (max-width: 768px) {
            .dimensiones-grid { grid-template-columns: 1fr; }
            .score-circulo { width: 120px; height: 120px; }
            .score-valor { font-size: 28px; }
            .nivel-titulo { font-size: 24px; }
            .acciones { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Resultados de la Evaluación</h1>
            <div class="header-info">
                <strong id="nit-display">-</strong>
                <span id="usuario-email">-</span>
            </div>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">Cargando resultados...</p>
        </div>

        <div id="error-section" class="error" style="display: none;">
            <strong>❌ Error:</strong> <span id="error-mensaje"></span>
        </div>

        <div id="content" style="display: none;">
            <div class="resultados-container">
                <!-- SCORE PRINCIPAL -->
                <div class="score-principal">
                    <div class="score-circulo">
                        <div class="score-valor" id="score-total">0.00</div>
                        <div class="score-maximo">/ 5.0 puntos</div>
                    </div>
                    <div class="nivel-madurez">
                        <div class="nivel-titulo" id="nivel-titulo">-</div>
                        <div class="nivel-descripcion" id="nivel-descripcion">-</div>
                    </div>
                    <div class="porcentaje-total" id="porcentaje-total">-</div>
                </div>

                <!-- RECOMENDACIONES -->
                <div class="recomendaciones" id="recomendaciones-section">
                    <h3>💡 Recomendaciones Estratégicas</h3>
                    <div id="recomendaciones-lista"></div>
                </div>

                <!-- DIMENSIONES -->
                <h3 style="margin-bottom: 20px; color: #333;">📈 Desglose por Dimensiones</h3>
                <div class="dimensiones-grid" id="dimensiones-grid"></div>

                <!-- ACCIONES -->
                <div class="acciones">
                    <button class="btn-guardar" onclick="guardarResultados()" id="btn-guardar">💾 Guardar resultados</button>
                    <button class="btn-descargar" onclick="descargarReporte()">📄 Descargar PDF</button>
                    <button class="btn-compartir" onclick="compartirResultados()">📤 Compartir</button>
                    <button class="btn-volver-db" id="btn-volver-db" onclick="window.location.href='database.html'" style="display:none;">← Volver a BD</button>
                    <button class="btn-nueva-evaluacion" onclick="nuevaEvaluacion()">🔄 Nueva Evaluación</button>
                </div>
                <div id="guardar-mensaje" class="mensaje-estado" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script src="calculador-madurez.js"></script>
    <script>
        let resultado = null;
        let reporte = null;
        let sesionData = null;

        async function inicializarResultados() {
            try {
                const isAdmin = localStorage.getItem('admin') === 'true';
                const query = new URLSearchParams(window.location.search);
                const registroSeleccionado = query.get('registroSeleccionado');

                // Validar acceso
                const sesion = localStorage.getItem('sesionActiva');
                if (!sesion && !isAdmin) {
                    window.location.href = 'index.html';
                    return;
                }

                if (sesion) {
                    sesionData = JSON.parse(sesion);
                    // Mostrar NIT como identificador
                    const nitDisplay = sesionData.nit || sesionData.companyName || 'Empresa';
                    document.getElementById('nit-display').textContent = nitDisplay;
                    document.getElementById('usuario-email').textContent = sesionData.email || 'Usuario';
                }

                if (registroSeleccionado && localStorage.getItem('registroSeleccionado')) {
                    if (!isAdmin) {
                        window.location.href = 'index.html';
                        return;
                    }
                    const registro = JSON.parse(localStorage.getItem('registroSeleccionado'));
                    localStorage.removeItem('registroSeleccionado');
                    await cargarDetalleSeleccionado(registro);
                    // Mostrar botón volver a BD para admin
                    document.getElementById('btn-volver-db').style.display = 'inline-block';
                    document.getElementById('btn-guardar').style.display = 'none';
                } else {
                    const evaluacion = localStorage.getItem('ultimaEvaluacion');
                    if (!evaluacion) {
                        mostrarError('No se encontraron resultados de evaluación');
                        return;
                    }
                    const datosEvaluacion = JSON.parse(evaluacion);
                    resultado = datosEvaluacion.resultado;
                    reporte = datosEvaluacion.reporte;
                    // Mostrar NIT desde evaluación
                    const nitEval = datosEvaluacion.empresa || (sesionData && (sesionData.nit || sesionData.companyName)) || 'Empresa';
                    document.getElementById('nit-display').textContent = nitEval;
                    mostrarResultados();
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al cargar los resultados: ' + error.message);
            }
        }

        async function cargarDetalleSeleccionado(rawRegistro) {
            try {
                mostrarGuardarMensaje('Cargando registro seleccionado...', '');

                // Si tiene resultado_json completo, usarlo directamente
                const resultadoJsonStr = rawRegistro.resultado_json || rawRegistro['resultado_json'] || '';
                if (resultadoJsonStr && resultadoJsonStr !== '') {
                    try {
                        resultado = JSON.parse(resultadoJsonStr);
                        const nit = rawRegistro.empresa || rawRegistro.Empresa || rawRegistro.nit || 'NIT';
                        const madurez = Number(rawRegistro.madurez || rawRegistro['madurez_%'] || 0);
                        resultado.totalPorcentaje = madurez || resultado.totalPorcentaje || 0;
                        reporte = {
                            recomendaciones: (resultado.dimensiones || []).filter(d => d.porcentaje < 75).map(d => ({
                                dimension: d.nombreDimension,
                                accion: d.porcentaje < 50
                                    ? `Mejorar ${d.nombreDimension} - actualmente en ${d.porcentaje.toFixed(1)}% de madurez`
                                    : `Optimizar ${d.nombreDimension} para alcanzar máximo potencial (${d.porcentaje.toFixed(1)}%)`
                            }))
                        };
                        document.getElementById('nit-display').textContent = nit;
                        mostrarResultados();
                        mostrarGuardarMensaje('Detalle cargado desde la base de datos.', 'exito');
                        return;
                    } catch(e) {
                        console.warn('No se pudo parsear resultado_json, usando normalizarRegistro');
                    }
                }

                // Fallback: datos básicos de Sheets
                const registro = normalizarRegistro(rawRegistro);
                resultado = {
                    total: Number(registro.puntajeTotal) || 0,
                    nivelMadurez: registro.nivel || '-',
                    totalPorcentaje: Number(registro.madurez) || parseFloat((Number(registro.puntajeTotal) / 5 * 100).toFixed(1)) || 0,
                    descripcionNivel: registro.nivel || '-',
                    dimensiones: (registro.dimensiones || []).map(dim => ({
                        nombreDimension: dim.nombre || dim.nombreDimension || dim.dimension || '-',
                        porcentaje: Number(dim.porcentaje) || 0,
                        parametros: []
                    }))
                };
                reporte = {
                    recomendaciones: (resultado.dimensiones || []).filter(d => d.porcentaje < 75).map(d => ({
                        dimension: d.nombreDimension,
                        accion: d.porcentaje < 50
                            ? `Mejorar ${d.nombreDimension} - actualmente en ${d.porcentaje.toFixed(1)}% de madurez`
                            : `Optimizar ${d.nombreDimension} para alcanzar máximo potencial (${d.porcentaje.toFixed(1)}%)`
                    }))
                };
                document.getElementById('nit-display').textContent = registro.nit;
                mostrarResultados();
                mostrarGuardarMensaje('Detalle cargado desde la base de datos.', 'exito');
            } catch (error) {
                mostrarError(error.message);
                throw error;
            }
        }

        function normalizarRegistro(rawRegistro) {
            // NIT: puede venir en campo 'empresa' (compatibilidad Sheets) o 'nit'
            const nit = rawRegistro.nit || rawRegistro.NIT || rawRegistro.empresa || rawRegistro.Empresa || rawRegistro.company || rawRegistro.companyName || '-';
            const nivel = rawRegistro.nivel || rawRegistro.Nivel || rawRegistro.nivelMadurez || rawRegistro.NivelMadurez || '-';
            const puntajeTotal = Number(rawRegistro.puntaje_total ?? rawRegistro.puntajeTotal ?? rawRegistro['puntaje total'] ?? rawRegistro['Puntaje Total'] ?? rawRegistro.total ?? 0);
            const madurez = Number(rawRegistro.madurez ?? rawRegistro['madurez_%'] ?? rawRegistro['Madurez %'] ?? 0);
            let dimensiones = rawRegistro.dimensiones || rawRegistro.Dimensiones || '';

            if (typeof dimensiones === 'string' && dimensiones.trim() !== '') {
                dimensiones = dimensiones.split(';').map(item => {
                    const colonIdx = item.lastIndexOf(':');
                    if (colonIdx === -1) return null;
                    const nombre = item.substring(0, colonIdx).trim();
                    const porcentaje = parseFloat(item.substring(colonIdx + 1).replace('%', '').trim()) || 0;
                    return { nombre, porcentaje };
                }).filter(Boolean);
            } else if (!Array.isArray(dimensiones)) {
                dimensiones = [];
            }

            const madurezReal = madurez || (puntajeTotal > 0 ? parseFloat((puntajeTotal / 5 * 100).toFixed(1)) : 0);
            return { nit, nivel, puntajeTotal, madurez: madurezReal, dimensiones };
        }

        function mostrarResultados() {
            if (!resultado || !reporte) {
                mostrarError('Datos de evaluación incompletos');
                return;
            }
            document.getElementById('score-total').textContent = resultado.total.toFixed(2);
            document.getElementById('nivel-titulo').textContent = resultado.nivelMadurez;
            document.getElementById('nivel-descripcion').textContent = resultado.descripcionNivel || resultado.nivelMadurez;
            document.getElementById('porcentaje-total').textContent = `Madurez: ${resultado.totalPorcentaje.toFixed(1)}%`;
            mostrarRecomendaciones();
            mostrarDimensiones();
        }

        function mostrarRecomendaciones() {
            const lista = document.getElementById('recomendaciones-lista');
            if (!reporte.recomendaciones || reporte.recomendaciones.length === 0) {
                lista.innerHTML = '<p>No hay recomendaciones específicas para tu nivel actual.</p>';
                return;
            }
            lista.innerHTML = reporte.recomendaciones.map(rec => `
                <div class="recomendacion-item">
                    <div class="recomendacion-titulo">${rec.dimension}</div>
                    <div class="recomendacion-texto">${rec.accion}</div>
                </div>`).join('');
        }

        function formatearClasificacion(porcentaje) {
            const valor = Math.round(porcentaje);
            let clasificacion = 'Sin datos';
            if (valor >= 81) clasificacion = 'Perfecto';
            else if (valor >= 61) clasificacion = 'Alto';
            else if (valor >= 41) clasificacion = 'Medio';
            else if (valor >= 21) clasificacion = 'Bajo';
            else if (valor >= 0) clasificacion = 'Crítico';
            return `${valor}% - ${clasificacion}`;
        }

        function claseClasificacion(porcentaje) {
            const valor = Math.round(porcentaje);
            if (valor >= 81) return 'estado-perfecto';
            if (valor >= 61) return 'estado-alto';
            if (valor >= 41) return 'estado-medio';
            if (valor >= 21) return 'estado-bajo';
            if (valor >= 0) return 'estado-critico';
            return '';
        }

        function mostrarDimensiones() {
            const grid = document.getElementById('dimensiones-grid');
            let html = '';
            (resultado.dimensiones || []).forEach(dim => {
                const porcentajeLleno = dim.porcentaje || 0;
                const textoDimension = formatearClasificacion(dim.porcentaje);
                const claseDimension = claseClasificacion(dim.porcentaje);
                const parametros = Array.isArray(dim.parametros) ? dim.parametros : [];
                html += `
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <div class="dimension-nombre">${dim.nombreDimension}</div>
                            <div class="dimension-score ${claseDimension}">${textoDimension}</div>
                        </div>
                        <div class="barra-progreso"><div class="barra-fill" style="width:${porcentajeLleno}%"></div></div>
                        <div class="dimension-porcentaje">${textoDimension}</div>
                        ${parametros.length > 0 ? `
                        <div class="parametros-list">
                            ${parametros.map(param => {
                                const textoParam = formatearClasificacion(param.porcentaje);
                                const claseParam = claseClasificacion(param.porcentaje);
                                return `<div class="parametro-item">
                                    <span class="parametro-nombre">${param.nombreParametro}</span>
                                    <span class="parametro-score ${claseParam}">${textoParam}</span>
                                </div>`;
                            }).join('')}
                        </div>` : ''}
                    </div>`;
            });
            grid.innerHTML = html;
        }

        async function guardarResultados() {
            try {
                if (!resultado) {
                    mostrarGuardarMensaje('No hay resultados cargados para guardar.', 'error');
                    return;
                }
                if (localStorage.getItem('evaluacionGuardadaEnBD') === '1') {
                    mostrarGuardarMensaje('Esta evaluación ya fue guardada.', 'exito');
                    setTimeout(() => { window.location.href = 'database.html'; }, 1500);
                    return;
                }

                const evalRaw = localStorage.getItem('ultimaEvaluacion');
                const evalData = evalRaw ? JSON.parse(evalRaw) : {};

                // Usar NIT como identificador
                const nitEmpresa = evalData.empresa ||
                    document.getElementById('nit-display').textContent.trim() ||
                    (sesionData && (sesionData.nit || sesionData.companyName)) || 'NIT-desconocido';

                const dimensionesStr = (resultado.dimensiones || [])
                    .map(dim => `${dim.nombreDimension}: ${Number(dim.porcentaje).toFixed(1)}%`)
                    .join('; ');

                const resultadoCompleto = JSON.stringify(resultado);

                const payload = {
                    empresa: nitEmpresa,   // campo 'empresa' en Sheets = NIT
                    fecha: new Date().toISOString(),
                    puntajeTotal: Number(resultado.total) || 0,
                    nivel: resultado.nivelMadurez || '-',
                    madurez: Number(resultado.totalPorcentaje) || 0,
                    dimensiones: dimensionesStr,
                    resultado_json: resultadoCompleto
                };

                console.log('Guardando payload:', payload);
                mostrarGuardarMensaje('Guardando...', '');

                const response = await fetch('https://script.google.com/macros/s/AKfycbzwIG1w8c79MAO0gM_m0D0uFpbKD3GVpLu2ygP1sHEGPSRb9DJmX2xsx4W6bYcGMXDB/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch (error) { throw new Error(`Respuesta no válida del servidor: ${text.slice(0, 250)}`); }

                if (!data.success) throw new Error(data.error || 'No se pudo guardar el resultado.');

                localStorage.setItem('evaluacionGuardadaEnBD', '1');
                mostrarGuardarMensaje('Resultados guardados correctamente en la base de datos.', 'exito');
                setTimeout(() => { window.location.href = 'database.html'; }, 1500);
            } catch (error) {
                mostrarGuardarMensaje(`Error guardando: ${error.message}`, 'error');
            }
        }

        function mostrarGuardarMensaje(texto, tipo) {
            const mensaje = document.getElementById('guardar-mensaje');
            mensaje.textContent = texto;
            mensaje.className = 'mensaje-estado';
            if (tipo === 'exito') mensaje.classList.add('exito');
            if (tipo === 'error') mensaje.classList.add('error');
        }

        function descargarReporte() {
            if (typeof window.jspdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script.onload = () => generarPDF();
                script.onerror = () => mostrarError('No se pudo cargar la librería PDF. Verifica tu conexión a internet.');
                document.head.appendChild(script);
            } else {
                generarPDF();
            }
        }

        function generarPDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const nit = document.getElementById('nit-display').textContent.trim() || (sesionData && (sesionData.nit || sesionData.companyName)) || 'NIT';
                const usuario = (sesionData && sesionData.userName) || '';
                const email = (sesionData && sesionData.email) || '';
                const fecha = new Date().toLocaleDateString('es-ES');
                const puntaje = resultado?.total?.toFixed(2) || '0.00';
                const porcentaje = resultado?.totalPorcentaje?.toFixed(1) || '0.0';
                const nivel = resultado?.nivelMadurez || '-';
                const descripcion = resultado?.descripcionNivel || nivel;
                const dimensiones = resultado?.dimensiones || [];

                const morado = [102, 126, 234], blanco = [255, 255, 255], grisClaro = [248, 249, 250], grisTexto = [100, 100, 100], negro = [30, 30, 30];

                doc.setFillColor(...morado);
                doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(...blanco);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text('Reporte de Evaluacion de Madurez', 15, 17);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(`NIT: ${nit}`, 15, 27);
                doc.text(`Fecha: ${fecha}`, 15, 35);
                if (usuario) doc.text(`Usuario: ${usuario}  |  ${email}`, 15, 43);

                let y = 58;
                doc.setFillColor(...grisClaro);
                doc.roundedRect(15, y, 180, 38, 4, 4, 'F');
                doc.setTextColor(...morado);
                doc.setFontSize(26);
                doc.setFont('helvetica', 'bold');
                doc.text(`${puntaje} / 5.0`, 105, y + 13, { align: 'center' });
                doc.setFontSize(13);
                doc.setTextColor(...negro);
                doc.text(nivel, 105, y + 23, { align: 'center' });
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(...grisTexto);
                doc.text(`Madurez: ${porcentaje}%`, 105, y + 32, { align: 'center' });

                y += 48;
                const descLines = doc.splitTextToSize(descripcion, 180);
                doc.setFontSize(10);
                doc.setTextColor(...grisTexto);
                doc.text(descLines, 15, y);
                y += descLines.length * 5 + 10;

                doc.setFillColor(...morado);
                doc.rect(15, y, 180, 8, 'F');
                doc.setTextColor(...blanco);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.text('Desglose por Dimensiones', 18, y + 5.5);
                y += 14;

                dimensiones.forEach((dim, i) => {
                    if (y > 265) { doc.addPage(); y = 20; }
                    const pct = Math.round(dim.porcentaje || 0);
                    let clasificacion = 'Critico';
                    let colorBarra = [220, 53, 69];
                    if (pct >= 81) { clasificacion = 'Perfecto'; colorBarra = [40, 167, 69]; }
                    else if (pct >= 61) { clasificacion = 'Alto'; colorBarra = [255, 193, 7]; }
                    else if (pct >= 41) { clasificacion = 'Medio'; colorBarra = [253, 126, 20]; }
                    else if (pct >= 21) { clasificacion = 'Bajo'; colorBarra = [220, 53, 69]; }

                    doc.setFillColor(i % 2 === 0 ? 255 : 248, i % 2 === 0 ? 255 : 249, i % 2 === 0 ? 255 : 252);
                    doc.roundedRect(15, y, 180, 22, 2, 2, 'F');
                    doc.setDrawColor(230, 230, 230);
                    doc.roundedRect(15, y, 180, 22, 2, 2, 'S');
                    doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(...negro);
                    doc.text((dim.nombreDimension || '-').substring(0, 50), 19, y + 7);
                    doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(...colorBarra);
                    doc.text(`${pct}% - ${clasificacion}`, 191, y + 7, { align: 'right' });
                    doc.setFillColor(220, 220, 220);
                    doc.roundedRect(19, y + 12, 172, 4, 2, 2, 'F');
                    const ancho = Math.max((pct / 100) * 172, 2);
                    doc.setFillColor(...colorBarra);
                    doc.roundedRect(19, y + 12, ancho, 4, 2, 2, 'F');
                    y += 26;
                });

                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFillColor(...morado);
                    doc.rect(0, 287, 210, 10, 'F');
                    doc.setTextColor(...blanco);
                    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
                    doc.text('Evaluacion de Madurez Comercial', 15, 293);
                    doc.text(`Pagina ${i} de ${totalPages}`, 195, 293, { align: 'right' });
                }

                doc.save(`reporte-madurez-${nit.replace(/[^a-zA-Z0-9]/g, '-')}.pdf`);
                mostrarExito('✅ Reporte PDF descargado exitosamente');

            } catch (error) {
                mostrarError('Error al generar el PDF: ' + error.message);
            }
        }

        function compartirResultados() {
            const nit = document.getElementById('nit-display').textContent.trim() || 'la empresa';
            const texto = `NIT ${nit} obtuvo un nivel de madurez "${resultado.nivelMadurez}" con ${resultado.total.toFixed(2)} puntos de 5.0 (${resultado.totalPorcentaje.toFixed(1)}%). ${resultado.descripcionNivel || ''}`;
            if (navigator.share) {
                navigator.share({ title: 'Resultados Evaluación de Madurez', text: texto, url: window.location.href });
            } else {
                navigator.clipboard.writeText(texto).then(() => {
                    mostrarExito('✅ Resultados copiados al portapapeles');
                }).catch(() => {
                    mostrarError('No se pudo compartir. Copia manualmente: ' + texto);
                });
            }
        }

        function nuevaEvaluacion() {
            if (confirm('¿Estás seguro de que quieres realizar una nueva evaluación? Se perderán los resultados actuales.')) {
                localStorage.removeItem('sesionActiva');
                localStorage.removeItem('ultimaEvaluacion');
                localStorage.removeItem('borrador-encuesta');
                localStorage.removeItem('evaluacionGuardadaEnBD');
                window.location.href = 'index.html';
            }
        }

        function mostrarError(mensaje) {
            document.getElementById('error-section').style.display = 'block';
            document.getElementById('error-mensaje').textContent = mensaje;
            document.getElementById('loading').style.display = 'none';
        }

        function mostrarExito(mensaje) {
            const div = document.createElement('div');
            div.className = 'success';
            div.textContent = mensaje;
            document.querySelector('header').appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        window.addEventListener('load', inicializarResultados);
    </script>
</body>
</html>
